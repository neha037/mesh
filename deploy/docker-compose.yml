services:
  # ─── PostgreSQL with pgvector ───────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mesh-postgres
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mesh
      POSTGRES_USER: mesh
      POSTGRES_PASSWORD: ${PG_PASSWORD:?Set PG_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesh"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── MinIO Object Storage ──────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: mesh-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-meshadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?Set MINIO_PASSWORD in .env}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Ollama Local LLM ─────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: mesh-ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    profiles: ["ai"]
    deploy:
      resources:
        limits:
          memory: 8G

  # ─── Go API Server ────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: mesh-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://mesh:${PG_PASSWORD}@postgres:5432/mesh?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-meshadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      MINIO_BUCKET: mesh-images
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-embeddinggemma:300m-qat-q8_0}
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G

  # ─── Go Background Worker ─────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    container_name: mesh-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://mesh:${PG_PASSWORD}@postgres:5432/mesh?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-meshadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-embeddinggemma:300m-qat-q8_0}
      WORKER_COUNT: 4
      LOG_LEVEL: info
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G

  # ─── React Frontend (Phase 4) ─────────────────────────
  # web:
  #   build:
  #     context: ../web
  #     dockerfile: ../deploy/Dockerfile.web
  #   container_name: mesh-web
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:3000:80"
  #   depends_on:
  #     - api

volumes:
  pgdata:
    driver: local
  minio_data:
    driver: local
  ollama_models:
    driver: local
