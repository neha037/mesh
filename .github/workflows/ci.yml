name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: go test ./... -v -race -coverprofile=coverage.out -count=1
      - name: Report coverage
        run: go tool cover -func=coverage.out

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run integration tests
        run: go test ./... -v -race -tags=integration -count=1
        timeout-minutes: 10

  check-sqlc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
      - name: Verify sqlc generated code is up-to-date
        run: |
          sqlc generate
          git diff --exit-code internal/storage/ || \
            (echo "sqlc generated code is stale — run 'make sqlc' and commit"; exit 1)

  lint-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install squawk
        run: npm install -g squawk-cli
      - name: Lint SQL migrations
        run: squawk migrations/*.up.sql

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run vulnerability check
        run: |
          go mod tidy
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Check go mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

  build:
    runs-on: ubuntu-latest
    needs: [lint, lint-sql, test, check-sqlc]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binaries
        run: |
          go build -o bin/mesh-api ./cmd/api
          go build -o bin/mesh-worker ./cmd/worker

  docker:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f deploy/Dockerfile.api -t mesh-api:ci .
      - name: Build Worker image
        run: docker build -f deploy/Dockerfile.worker -t mesh-worker:ci .
